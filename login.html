<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMgram — Kirish</title>
<style>
  :root{--bg:#0a0a0f;--card:#13131a;--neon:#c8ff47;--purple:#7b5cfa;--text:#e8e8f0;--sub:#888}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .auth-logo{font-size:2rem;font-weight:900;color:var(--neon);letter-spacing:2px;margin-bottom:6px;text-align:center}
  .auth-sub{color:var(--sub);font-size:.85rem;margin-bottom:28px;text-align:center}
  .auth-card{background:var(--card);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;border:1px solid #1e1e2e}
  .auth-card h2{font-size:1.1rem;font-weight:800;margin-bottom:20px;text-align:center}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:.8rem;color:var(--sub);margin-bottom:5px;font-weight:600}
  .form-group input{width:100%;background:#0d0d14;border:1px solid #2a2a3a;color:var(--text);padding:12px 16px;border-radius:12px;font-size:.9rem;outline:none;transition:.2s}
  .form-group input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,92,250,.15)}
  .btn-submit{width:100%;padding:13px;border-radius:12px;border:none;background:var(--purple);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:6px}
  .btn-submit:hover{background:#6a4de0;transform:translateY(-1px)}
  .auth-footer{text-align:center;margin-top:18px;font-size:.85rem;color:var(--sub)}
  .auth-footer a{color:var(--neon);font-weight:600}
  .flash-msg{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:.85rem;width:100%;max-width:380px;text-align:center}
  .flash-success{background:#1a3a1a;border:1px solid #2d6a2d;color:#6fcf6f}
  .flash-error{background:#3a1a1a;border:1px solid #6a2d2d;color:#cf6f6f}
  .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--sub);font-size:.8rem}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#2a2a3a}
  .demo-info{background:#0d0d14;border:1px solid #2a2a3a;border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--sub);margin-top:14px}
  .demo-info span{color:var(--neon);font-weight:600}
</style>
</head>
<body>

<div class="auth-logo">🎵 GMgram</div>
<div class="auth-sub">Musiqiy ijtimoiy tarmoq</div>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<div class="auth-card">
  <h2>Hisobga kirish</h2>
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Username kiriting" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" name="password" placeholder="Parol kiriting" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit">Kirish →</button>
  </form>
  <div class="divider">yoki</div>
  <div class="demo-info">
    Demo: <span>admin</span> / <span>admin123</span><br>
    Demo: <span>demouser</span> / <span>demo123</span>
  </div>
</div>

<div class="auth-footer">
  Akkauntingiz yo'qmi? <a href="{{ url_for('register') }}">Ro'yxatdan o'tish</a>
</div>

</body>
</html>
