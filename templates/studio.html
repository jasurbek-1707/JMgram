<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMgram — Studio</title>
<style>
  :root{--bg:#0a0a0f;--card:#13131a;--neon:#c8ff47;--purple:#7b5cfa;--text:#e8e8f0;--sub:#888}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;padding-bottom:40px}
  a{color:inherit;text-decoration:none}
  nav{background:#0d0d14;border-bottom:1px solid #1e1e2e;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-size:1.4rem;font-weight:800;color:var(--neon)}
  .nav-links{display:flex;gap:10px;align-items:center}
  .btn{padding:7px 18px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:.85rem}
  .btn-outline{background:transparent;border:1px solid var(--purple);color:var(--purple)}
  .container{max-width:560px;margin:0 auto;padding:24px 16px}
  .studio-header{text-align:center;margin-bottom:28px}
  .studio-header h1{font-size:1.4rem;font-weight:900;color:var(--neon)}
  .studio-header p{color:var(--sub);font-size:.85rem;margin-top:4px}
  .studio-card{background:var(--card);border-radius:18px;padding:24px;border:1px solid #1e1e2e}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:.82rem;color:var(--sub);margin-bottom:6px;font-weight:600}
  .form-group input,.form-group select{width:100%;background:#0d0d14;border:1px solid #2a2a3a;color:var(--text);padding:12px 16px;border-radius:12px;font-size:.88rem;outline:none;transition:.2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(200,255,71,.08)}
  .form-group select option{background:#0d0d14}
  .file-input-wrapper{position:relative;border:2px dashed #2a2a3a;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;background:#0d0d14}
  .file-input-wrapper:hover{border-color:var(--purple)}
  .file-input-wrapper input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .file-icon{font-size:1.8rem;margin-bottom:6px}
  .file-label{font-size:.85rem;color:var(--sub)}
  .btn-upload{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--neon),#a8e832);color:#0a0a0f;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s;margin-top:8px}
  .btn-upload:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,255,71,.3)}
  .flash-msg{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.88rem;text-align:center}
  .flash-success{background:#1a3a1a;border:1px solid #2d6a2d;color:#6fcf6f}
  .flash-error{background:#3a1a1a;border:1px solid #6a2d2d;color:#cf6f6f}
</style>
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}" class="logo">🎵 GMgram</a>
  <div class="nav-links">
    <a href="{{ url_for('profile', uid=user.id) }}" class="btn btn-outline">Profil</a>
    <a href="{{ url_for('logout') }}">Chiqish</a>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="studio-header">
    <h1>🎙 Studio</h1>
    <p>Musiqangizni dunyo bilan ulashing</p>
  </div>

  <div class="studio-card">
    <form method="POST" action="{{ url_for('studio') }}" enctype="multipart/form-data">
      <div class="form-group">
        <label>Musiqa sarlavhasi *</label>
        <input type="text" name="title" placeholder="Musiqangiz nomini kiriting" required>
      </div>
      <div class="form-group">
        <label>Ijrochi *</label>
        <input type="text" name="artist" placeholder="Artist yoki guruh nomi" required>
      </div>
      <div class="form-group">
        <label>Janr *</label>
        <select name="genre">
          <option value="Pop">🎤 Pop</option>
          <option value="Bass">🔊 Bass</option>
          <option value="Remix">🎛 Remix</option>
          <option value="Turkcha">🌙 Turkcha</option>
          <option value="Hip-Hop">🎤 Hip-Hop</option>
          <option value="Electronic">⚡ Electronic</option>
          <option value="R&B">🎶 R&B</option>
          <option value="Classical">🎻 Classical</option>
        </select>
      </div>
      <div class="form-group">
        <label>Audio fayl (.mp3, .wav, .ogg) *</label>
        <div class="file-input-wrapper" id="audioWrapper">
          <input type="file" name="audio_file" accept=".mp3,.wav,.ogg" required
                 onchange="updateLabel(this,'audioLabel','🎵')">
          <div class="file-icon">🎵</div>
          <div class="file-label" id="audioLabel">Audio faylni tanlash uchun bosing</div>
        </div>
      </div>
      <div class="form-group">
        <label>Muqova rasm (ixtiyoriy)</label>
        <div class="file-input-wrapper" id="coverWrapper">
          <input type="file" name="cover_file" accept=".jpg,.jpeg,.png,.webp"
                 onchange="updateLabel(this,'coverLabel','🖼')">
          <div class="file-icon">🖼</div>
          <div class="file-label" id="coverLabel">Rasm tanlash uchun bosing</div>
        </div>
      </div>
      <button type="submit" class="btn-upload">🚀 Yuklash va Ulashish</button>
    </form>
  </div>
</div>

<script>
function updateLabel(input, labelId, icon) {
  const label = document.getElementById(labelId);
  if (input.files && input.files[0]) {
    label.textContent = icon + ' ' + input.files[0].name;
    label.style.color = 'var(--neon)';
  }
}
</script>
</body>
</html>
