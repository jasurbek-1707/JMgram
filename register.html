<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMgram — Ro'yxatdan o'tish</title>
<style>
  :root{--bg:#0a0a0f;--card:#13131a;--neon:#c8ff47;--purple:#7b5cfa;--text:#e8e8f0;--sub:#888}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .auth-logo{font-size:2rem;font-weight:900;color:var(--neon);letter-spacing:2px;margin-bottom:6px;text-align:center}
  .auth-sub{color:var(--sub);font-size:.85rem;margin-bottom:28px;text-align:center}
  .auth-card{background:var(--card);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;border:1px solid #1e1e2e}
  .auth-card h2{font-size:1.1rem;font-weight:800;margin-bottom:20px;text-align:center}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:.8rem;color:var(--sub);margin-bottom:5px;font-weight:600}
  .form-group input{width:100%;background:#0d0d14;border:1px solid #2a2a3a;color:var(--text);padding:12px 16px;border-radius:12px;font-size:.9rem;outline:none;transition:.2s}
  .form-group input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(200,255,71,.1)}
  .btn-submit{width:100%;padding:13px;border-radius:12px;border:none;background:var(--neon);color:#0a0a0f;font-size:.95rem;font-weight:800;cursor:pointer;transition:.2s;margin-top:6px}
  .btn-submit:hover{opacity:.88;transform:translateY(-1px)}
  .auth-footer{text-align:center;margin-top:18px;font-size:.85rem;color:var(--sub)}
  .auth-footer a{color:var(--purple);font-weight:600}
  .flash-msg{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:.85rem;width:100%;max-width:380px;text-align:center}
  .flash-success{background:#1a3a1a;border:1px solid #2d6a2d;color:#6fcf6f}
  .flash-error{background:#3a1a1a;border:1px solid #6a2d2d;color:#cf6f6f}
  .password-hint{font-size:.75rem;color:var(--sub);margin-top:4px}
</style>
</head>
<body>

<div class="auth-logo">🎵 GMgram</div>
<div class="auth-sub">Bugun qo'shiling, musiqangizni ulashing!</div>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<div class="auth-card">
  <h2>Ro'yxatdan o'tish</h2>
  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label>Username *</label>
      <input type="text" name="username" placeholder="Noyob username tanlang" required
             minlength="3" maxlength="30" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" name="email" placeholder="email@misol.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Parol *</label>
      <input type="password" name="password" placeholder="Kuchli parol kiriting" required
             minlength="6" autocomplete="new-password">
      <div class="password-hint">Kamida 6 ta belgi</div>
    </div>
    <button type="submit" class="btn-submit">Akkaunt Yaratish 🎵</button>
  </form>
</div>

<div class="auth-footer">
  Allaqachon akkauntingiz bormi? <a href="{{ url_for('login') }}">Kirish</a>
</div>

</body>
</html>
